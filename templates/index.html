<!DOCTYPE html>
<html>
<head>
  <title>PreSocial - AI Content Optimizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    h1 {
      margin-bottom: 30px;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>

<body>

<h1>PreSocial 🚀</h1>

<div class="card">
  <div class="section-title">Upload Content</div>
  <input type="file" id="fileInput">
  <br><br>
  <label>
    <input type="checkbox" id="useGen" checked>
    Generate AI Optimized Captions & Hooks
  </label>
  <br><br>
  <button id="uploadBtn">Upload & Analyze</button>
</div>

<div class="card">
  <div class="section-title">Status</div>
  <div id="statusBox">Idle</div>
</div>

<div class="card">
  <div class="section-title">Results</div>
  <div id="resultJson"></div>
</div>

<script src="/static/script.js?v=9999"></script>

</body>
</html>
